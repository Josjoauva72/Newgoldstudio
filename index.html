<body>
<div id="app"></div>

<script>
  // ========== USER SYSTEM ==========
  let users = JSON.parse(localStorage.getItem('new_gold_studio_users') || '[]');
  let currentUser = JSON.parse(localStorage.getItem('new_gold_studio_current_user') || 'null');
  
  // ========== STORE DATA ==========
  let shopData = {
    products: [],
    orders: [],
    customers: [],
    messages: [],
    nextProductId: 10,
    nextOrderId: 100,
    nextMessageId: 1
  };

  function initData() {
    const stored = localStorage.getItem('new_gold_studio_db');
    if(stored) {
      shopData = JSON.parse(stored);
    } else {
      shopData.products = [
        { id: 1, name: "Classic Walnut Frame", model: "NGS-WN-101", price: 899, category: "Wall Frames", image: "https://placehold.co/400x500/8B5A2B/FFFFFF?text=Walnut+Frame", modelImages: [], sizes: ["8x10 inches", "11x14 inches"], description: "Elegant walnut finish frame perfect for living room.", stock: 25 },
        { id: 2, name: "Minimalist Black Frame", model: "NGS-MB-202", price: 699, category: "Wall Frames", image: "https://placehold.co/400x500/1E1E1E/FFFFFF?text=Black+Frame", modelImages: [], sizes: ["8x10 inches", "12x16 inches"], description: "Sleek black frame for modern interiors.", stock: 30 },
        { id: 3, name: "Gold Ornate Frame", model: "NGS-GO-303", price: 1299, category: "Photo Prints", image: "https://placehold.co/400x500/D4AF37/000000?text=Gold+Frame", modelImages: [], sizes: ["A4", "A3"], description: "Luxurious gold ornate frame for special memories.", stock: 15 },
        { id: 4, name: "Custom Collage Frame", model: "NGS-CC-404", price: 1599, category: "Custom Frames", image: "https://placehold.co/400x500/90A955/FFFFFF?text=Custom+Collage", modelImages: [], sizes: ["3 Photo", "5 Photo"], description: "Create your own collage with multiple photo slots.", stock: 10 },
        { id: 5, name: "Rustic Wood Frame", model: "NGS-RW-505", price: 1099, category: "Wall Frames", image: "https://placehold.co/400x500/CDA776/FFFFFF?text=Rustic+Wood", modelImages: [], sizes: ["10x12 inches", "12x16 inches"], description: "Farmhouse style rustic wood frame.", stock: 20 },
        { id: 6, name: "Panoramic Frame", model: "NGS-PN-606", price: 1899, category: "Custom Frames", image: "https://placehold.co/400x500/2C5F8A/FFFFFF?text=Panoramic", modelImages: [], sizes: ["16x24 inches"], description: "Perfect for landscape and group photos.", stock: 8 }
      ];
      shopData.orders = [];
      shopData.customers = [];
      shopData.messages = [];
      shopData.nextProductId = 7;
      shopData.nextOrderId = 1001;
      shopData.nextMessageId = 1;
      saveData();
    }
    if(users.length === 0) {
      users = [{ id: 1, name: "Admin User", email: "admin@newgoldstudio.com", password: "admin123", phone: "8122564741", isAdmin: true, createdAt: new Date().toISOString() }];
      saveUsers();
    }
  }
  
  function saveData() { localStorage.setItem('new_gold_studio_db', JSON.stringify(shopData)); }
  function saveUsers() { localStorage.setItem('new_gold_studio_users', JSON.stringify(users)); }
  function saveCurrentUser() { localStorage.setItem('new_gold_studio_current_user', JSON.stringify(currentUser)); }

  let currentModal = null;
  function closeModal() { if(currentModal) { currentModal.remove(); currentModal = null; } }
  
  // ========== SEARCH FUNCTION ==========
  function performSearch(query) {
    if(!query.trim()) return [];
    const searchTerm = query.toLowerCase().trim();
    return shopData.products.filter(product => 
      product.name.toLowerCase().includes(searchTerm) ||
      (product.model && product.model.toLowerCase().includes(searchTerm)) ||
      product.category.toLowerCase().includes(searchTerm) ||
      product.description.toLowerCase().includes(searchTerm)
    );
  }
  
  function showSearchResults(query) {
    const results = performSearch(query);
    const resultsContainer = document.getElementById('searchResults');
    if(!resultsContainer) return;
    if(results.length === 0) {
      resultsContainer.innerHTML = `<div class="no-results"><i class="fas fa-search"></i> No products found for "${query}"</div>`;
    } else {
      resultsContainer.innerHTML = `
        <div class="search-results-header"><i class="fas fa-box"></i> ${results.length} product(s) found</div>
        <div class="search-results-list">
          ${results.map(product => `
            <div class="search-result-item" onclick="window.viewProductDetail(${product.id}); document.getElementById('searchResults').style.display='none';">
              <img src="${product.image}" class="search-result-img" alt="${product.name}">
              <div class="search-result-info">
                <div class="search-result-name">${product.name}</div>
                <div class="search-result-model">Model: ${product.model}</div>
                <div class="search-result-price">₹${product.price}</div>
              </div>
            </div>
          `).join('')}
        </div>
      `;

  function uploadModelImage(productId) {
    const product = shopData.products.find(p => p.id == productId);
    if(!product) return;
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'image/jpeg,image/png,image/jpg';
    fileInput.onchange = function(e) {
      const file = e.target.files[0];
      if(file) {
        const reader = new FileReader();
        reader.onload = function(ev) {
          if(!product.modelImages) product.modelImages = [];
          product.modelImages.push(ev.target.result);
          saveData(); showToast('Model image uploaded successfully!'); renderPage();
        };
        reader.readAsDataURL(file);
      }
    };
    fileInput.click();
  }
